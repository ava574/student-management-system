<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard - Placement</title>
    <link rel="stylesheet" th:href="@{/css/placement-style.css}">
</head>
<body>
<header class="topbar">
    <div class="title">Placement Management - Admin</div>
    <div class="topbar-nav">
        <a th:href="@{/admin/students}">Students</a>
        <a th:href="@{/admin/companies}">Companies</a>
        <a th:href="@{/admin/placements}">Placements</a>
        <a th:href="@{/auth/logout}">Logout</a>
    </div>
</header>

<main class="page">
    <section class="stats-grid">
        <div class="stat-card stat-blue">
            <h3>Total Students</h3>
            <div class="number" th:text="${totalStudents}">0</div>
        </div>
        <div class="stat-card stat-green">
            <h3>Total Companies</h3>
            <div class="number" th:text="${totalCompanies}">0</div>
        </div>
        <div class="stat-card stat-orange">
            <h3>Total Placements</h3>
            <div class="number" th:text="${totalPlacements}">0</div>
        </div>
    </section>

    <section class="card">
        <h3>Quick Links</h3>
        <p>
            <a th:href="@{/admin/students}" class="btn btn-secondary">Manage Students</a>
            <a th:href="@{/admin/companies}" class="btn btn-secondary">Manage Companies</a>
            <a th:href="@{/admin/placements}" class="btn btn-secondary">Manage Placements</a>
        </p>
    </section>
</main>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Company Form</title>
    <link rel="stylesheet" th:href="@{/css/placement-style.css}">
</head>
<body>
<header class="topbar">
    <div class="title">Company Form</div>
    <div class="topbar-nav">
        <a th:href="@{/admin/companies}">← Back</a>
    </div>
</header>

<main class="page">
    <section class="card">
        <form th:action="@{/admin/companies/save}" th:object="${company}" method="post">
            <input type="hidden" th:field="*{id}">

            <label>Company Name</label>
            <input type="text" th:field="*{name}" required>

            <label>Role</label>
            <input type="text" th:field="*{role}" required>

            <label>Minimum CGPA</label>
            <input type="number" step="0.01" th:field="*{minCgpa}" required>

            <label>Location</label>
            <input type="text" th:field="*{location}" required>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Save</button>
            </div>
        </form>
    </section>
</main>
</body>
</html>
